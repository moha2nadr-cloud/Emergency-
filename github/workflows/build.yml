name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Extract project
        run: unzip TawariApp_Complete.zip
      - name: Download Gradle Wrapper
        run: |
          cd TawariApp_Complete
          mkdir -p gradle/wrapper
          curl -L "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
      - name: Build APK
        run: |
          cd TawariApp_Complete
          ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: TawariApp-APK
          path: TawariApp_Complete/app/build/outputs/apk/debug/app-debug.apk
